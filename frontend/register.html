<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册界面</title>
    <style>
        .head{
            width: 200px;
            margin: 30px auto;
            text-align: center;
            
        }
        .uname{
            text-align: center;
        }
        .uname1{
            text-align: center;
            background-color: #fff;
            font-size: 16px;
            color: #333;
        }
        input{
            width: 286px;
            height: 45px;
            text-align: center;
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 16px;
            color: #333;
            outline: none;

        }
        button{
            width: 286px;
            height: 48px;
            border: none;
            border-radius: 8px;
            background-color: #12B7F5;
            text-align: center;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover{
            background-color: #0d8dd7;
        }
        button:active{
            background-color: #e5e7eb;
            transform: scale(0.90);
        }
        body{
            background-color: #f0f9ff;
        }
        .footer{
            font-size: 13px;
        }
        a{ color: #12B7F5;}
        .box{
            display: flex;
            width: 320px;
            height: 45px;
            margin: 10px auto;
        }
        #bcode{
            width: 150px;
        }
        #code{
            flex: 1;
            margin-top: 10px;
        }
        #msg{
            color: #333;
            background-color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="msg"></div>
    <div class="head"><h1>用户注册</h1></div>
    <div class="uname"><input type="text" placeholder="请输入账号" id="account"></div><br>
    <div class="uname"><input type="password" placeholder="请输入密码" id="password"></div><br>
    <div class="uname"><input type="password" placeholder="请确认密码" id="password2"></div><br>
    <div class="uname"><button id="register">注册</button></div><br>
    <div class="footer uname"><a href="login.html">已有账号去登录</a></div>
    <script>
        function showmsg(text){
            const msg=document.getElementById('msg')
            msg.innerHTML=text
            msg.style.display='block'
            setTimeout(() => {
                msg.style.display='none'
            }, 2000);

        }
        //注册
        document.getElementById('register').onclick=function(){
            const account=document.getElementById('account').value
            const password=document.getElementById('password').value
            const password2=document.getElementById('password2').value
            
            if(!account||!password||!password2){
                alert('请填写完整')
                return
            }
            if(password.length<8){
                alert('密码长度不能小于8位')
                return
            }
            if(password!==password2){
                alert('两次密码不一致')
                return
            }
            fetch('http://10.41.189.139:8080/user/register',{
                method:'POST',
                headers:{'content-type':'application/json'},
                body:JSON.stringify({
                    account: parseInt(account),
                    password
                })})
                .then(res=>res.json())
                .then(data=>{
                    if(data.status===10000){
                        showmsg('注册成功')
                        setTimeout(()=>location.href='login.html',2000)
                    }
                    else{
                        showmsg(data.info||'注册失败')
                    }
                })
                .catch(()=>showmsg('请求失败'))
            
        }    
        
    </script>
</body>
</html>
