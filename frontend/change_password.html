<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <style>
        .head{
            width: 200px;
            margin: 30px auto;
            text-align: center;
            
        }
        .uname{
            text-align: center;
        }
        .uname1{
            text-align: center;
            background-color: #fff;
            font-size: 16px;
            color: #333;
        }
        input{
            width: 286px;
            height: 45px;
            text-align: center;
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 16px;
            color: #333;
            outline: none;

        }
        button{
            width: 286px;
            height: 48px;
            border: none;
            border-radius: 8px;
            background-color: #12B7F5;
            text-align: center;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover{
            background-color: #0d8dd7;
        }
        button:active{
            background-color: #e5e7eb;
            transform: scale(0.90);
        }
        body{
            background-color: #f0f9ff;
        }
        .footer{
            font-size: 13px;
        }
        a{ color: #12B7F5;}
        .box{
            display: flex;
            width: 320px;
            height: 45px;
            margin: 10px auto;
        }
        #bcode{
            width: 150px;
        }
        #code{
            flex: 1;
            margin-top: 10px;
        }
        #msg{
            color: #333;
            background-color: #fff;
            text-align: center;
        }
    </style>
    
</head>
<body>
    <div id="msg"></div>
    <div class="head"><h1>修改密码</h1></div>
    <div class="uname"><input type="text" placeholder="请输入账号" id="account"></div><br>
    <div class="uname"><input type="password" placeholder="请输入原密码" id="password"></div><br>
    <div class="uname"><input type="password" placeholder="请输入新密码" id="new_password"></div><br>
    <div class="uname"><input type="password" placeholder="请确认新密码" id="confirm_password"></div><br>
    <div class="uname"><button id="register">确认修改</button></div><br>
    <div class="footer uname"><a href="login.html">返回登录</a></div>
    <script>
        function showmsg(text){
            const msg=document.getElementById('msg')
            msg.innerHTML=text
            msg.style.display='block'
            setTimeout(()=>{
                msg.style.display='none'
            },2000)}
        document.getElementById('register').onclick=function(){
            const account=document.getElementById('account').value
            const password=document.getElementById('password').value
            const new_password=document.getElementById('new_password').value
            const confirm_password=document.getElementById('confirm_password').value
            
            if(!account||!password||!new_password||!confirm_password){
                return showmsg('所填信息不能为空')
            }
            
            if(new_password!==confirm_password){
                return showmsg('两次输入的新密码不一致')
            }
            
            if(new_password.length<8){
                return showmsg('新密码长度不能小于8位')
            }
            
            const token=localStorage.getItem('token')
            if(!token){
                return showmsg('请先登录')
            }
            
            fetch('http://10.41.189.139:8080/user/password',{
                method:'PUT',
                headers:{
                    'content-type':'application/json',
                    'Authorization': token
                },
                body:JSON.stringify({
                    account: parseInt(account),
                    password,
                    new_password
                })})
                .then(res=>res.json())
                .then(data=>{
                    if(data.status===10000){
                        showmsg('修改密码成功')
                        setTimeout(()=>location.href='login.html',2000)
                    }
                    else{
                        showmsg(data.info||'修改密码失败')
                    }
                })
                .catch(()=>showmsg('请求失败'))
        }    
    </script>
</body>
</html>
